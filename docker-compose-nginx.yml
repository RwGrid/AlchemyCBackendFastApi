nginx-ssl-proxy:
  image: danieldent/nginx-ssl-proxy
  restart: always
  environment:
    UPSTREAM: 192.168.0.70:3300
    SERVERNAME: 192.168.0.70
  ports:
    - "80:80"
    - "443:443"
  volumes:
    - "/etc/letsencrypt"
#https://github.com/DanielDent/docker-nginx-ssl-proxy
