version: '3.5'

services:
  alchemy_api:
    container_name: alchemy_api
    image: alchemyc
    volumes:
       - ./.env:/app/.env
       - ./postgre.json:/app/all_episodes_json/postgre.json
    ports:
      - "3201:91"
    networks:
      - alchemy
    restart: unless-stopped


networks:
  alchemy:
    driver: bridge
